spring:
  application:
    name: banco-digital-api

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bankdb}
    username: ${DB_USERNAME:bank}
    password: ${DB_PASSWORD:bank}
    hikari:
      # Pool dimensionado para o cenario de alta concorrencia.
      maximum-pool-size: ${DB_POOL_SIZE:20}
      pool-name: bank-pool

  jpa:
    # Em producao o schema e versionado pelo Flyway; o Hibernate apenas valida.
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.compass.bank: INFO
