services:
  db:
    image: postgres:16-alpine
    container_name: bank-db
    environment:
      POSTGRES_DB: bankdb
      POSTGRES_USER: bank
      POSTGRES_PASSWORD: bank
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bank -d bankdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: bank-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/bankdb
      DB_USERNAME: bank
      DB_PASSWORD: bank
    ports:
      - "8080:8080"

volumes:
  pgdata:
